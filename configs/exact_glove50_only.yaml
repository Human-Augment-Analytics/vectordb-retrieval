indexers:
  brute_force_l2:
    type: BruteForceIndexer
    metric: l2

searchers:
  linear_l2:
    type: LinearSearcher
    metric: l2

algorithms:
  exact:
    indexer_ref: brute_force_l2
    searcher_ref: linear_l2
    metric: l2

datasets:
  - name: glove50
    metric: l2
    n_queries: 256
    topk: 20
    dataset_options:
      test_size: 256
      train_limit: 20000
      ground_truth_k: 200
      seed: 11

output_dir: benchmark_results
data_dir: /storage/ice-shared/cs8903onl/vectordb-retrieval/datasets
query_batch_size: 128
output_prefix: exact_only
repeat: 2
seed: 42
